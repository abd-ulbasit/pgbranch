name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# unit/integration/helm are fast. The `kube` job stands up a kind cluster and
# runs the Kubernetes + HA-failover suites (CSI best-effort). The Postgres
# version matrix still runs locally via the Makefile.
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:" >&2
            echo "$out" >&2
            exit 1
          fi
      - run: go test ./... -count=1

  integration:
    runs-on: ubuntu-latest # Docker preinstalled; overlay tests use --cap-add SYS_ADMIN
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: pre-pull images
        run: |
          docker pull -q postgres:17
          docker pull -q alpine:3.21
      # -p 1: serialize packages. The IT suites each spin Postgres containers
      # with published ephemeral ports; running packages in parallel on one
      # daemon races those ports ("address already in use"). Serializing trades
      # a little speed for determinism.
      - run: PGBRANCH_IT=1 go test ./... -count=1 -p 1 -timeout 25m

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: make helm-test

  kube:
    runs-on: ubuntu-latest # Docker preinstalled; the ITs create their own kind cluster
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v4
      - name: Install kind + kubectl
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          curl -fsSL -o kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
          chmod +x kind kubectl && sudo mv kind kubectl /usr/local/bin/
      # Gate: the Kubernetes runtime-driver suite (hostPath volumes, helper
      # pods, branch pods, overlay-in-pod). It bootstraps the kind cluster
      # (hack/kind-up.sh) and loads its images itself.
      - name: Kubernetes runtime ITs (kind, hostPath)
        run: PGBRANCH_K8S_IT=1 go test ./internal/runtime/ -count=1 -timeout 25m
      # Best-effort: the end-to-end helm-deploy and HA-failover suites and the
      # CSI suite. These exercise full chart installs / port-forwards / pod
      # failover whose timing is still being hardened for hosted runners, so
      # they run and report but don't gate the build yet.
      - name: Helm deploy + HA-failover ITs (best-effort)
        continue-on-error: true
        run: PGBRANCH_K8S_IT=1 go test ./internal/deploy/ -count=1 -timeout 25m
      - name: CSI ITs (best-effort — csi-driver-host-path install can be flaky)
        continue-on-error: true
        run: |
          hack/kind-csi-up.sh
          PGBRANCH_CSI_IT=1 go test ./internal/runtime/ -run CSI -count=1 -timeout 20m
