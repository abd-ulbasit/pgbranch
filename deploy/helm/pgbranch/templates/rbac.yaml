# branchd manages branch/helper pods in its own namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pgbranch.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  {{- if eq .Values.storage.mode "csi" }}
  # csi storage: branchd provisions PVCs (sources, branch clones) and — when
  # storage.snapshotClass is set — VolumeSnapshots, in its own namespace.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "delete", "get", "list"]
  {{- end }}
  {{- if eq (include "pgbranch.leaderElectionEnabled" .) "true" }}
  # HA leader election: branchd reads/writes the pgbranch-branchd Lease in its
  # own namespace to elect a single reconciling/writing leader.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "watch", "list"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pgbranch.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pgbranch.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pgbranch.fullname" . }}
    namespace: {{ .Release.Namespace }}
