{{- if .Values.ghook.enabled }}
{{- if not (or .Values.ghook.webhookSecret .Values.ghook.existingSecret) }}
{{- fail "set ghook.webhookSecret or ghook.existingSecret (webhook HMAC secret)" }}
{{- end }}
{{- if and .Values.ghook.appId .Values.ghook.githubToken }}
{{- fail "ghook.appId/ghook.appPrivateKey and ghook.githubToken are mutually exclusive — pick App or PAT auth" }}
{{- end }}
{{- if and .Values.ghook.appId (not (or .Values.ghook.appPrivateKey .Values.ghook.existingSecret)) }}
{{- fail "ghook.appId needs ghook.appPrivateKey (or an existingSecret carrying app-private-key)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgbranch.ghook.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghook
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pgbranch.ghook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgbranch.ghook.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ghook
          image: "{{ .Values.ghook.image.repository }}:{{ .Values.ghook.image.tag }}"
          imagePullPolicy: {{ .Values.ghook.image.pullPolicy }}
          env:
            - name: GHOOK_LISTEN
              value: ":{{ .Values.ghook.port }}"
            - name: GHOOK_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbranch.ghook.secretName" . }}
                  key: webhook-secret
            # branchd's REST API via in-cluster DNS
            - name: GHOOK_PGBRANCH_SERVER
              value: http://{{ include "pgbranch.fullname" . }}-api:{{ .Values.api.port }}
            - name: GHOOK_PGBRANCH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbranch.tokenSecretName" . }}
                  key: token
            - name: GHOOK_SOURCE
              value: {{ required "set ghook.source (pgbranch source to branch from)" .Values.ghook.source | quote }}
            {{- with .Values.ghook.ttl }}
            - name: GHOOK_TTL
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.ghook.resetOnPush }}
            - name: GHOOK_RESET_ON_PUSH
              value: "true"
            {{- end }}
            {{- if .Values.ghook.diffOnPush }}
            - name: GHOOK_DIFF_ON_PUSH
              value: "true"
            {{- end }}
            {{- with .Values.ghook.repos }}
            - name: GHOOK_REPOS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.ghook.branchNaming }}
            - name: GHOOK_BRANCH_NAMING
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.ghook.proxyHost }}
            - name: GHOOK_PROXY_HOST
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.ghook.githubAPI }}
            - name: GHOOK_GITHUB_API
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.ghook.appId }}
            # GitHub App auth: the service mints installation tokens itself
            - name: GHOOK_APP_ID
              value: {{ .Values.ghook.appId | quote }}
            - name: GHOOK_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbranch.ghook.secretName" . }}
                  key: app-private-key
            {{- else }}
            # optional PAT: enables the live PR comment and commit statuses
            - name: GHOOK_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbranch.ghook.secretName" . }}
                  key: github-token
                  optional: true
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ghook.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          # Internet-facing webhook receiver: needs zero privileges. Strict,
          # non-toggleable hardening — run as a non-root UID with a read-only
          # rootfs, no privilege escalation, all caps dropped, RuntimeDefault
          # seccomp. /tmp is an emptyDir so the rootfs can stay read-only.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.ghook.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
