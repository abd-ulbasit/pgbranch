apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgbranch.fullname" . }}-api
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "pgbranch.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.api.port }}
      targetPort: api
