{{- if .Values.ghook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgbranch.ghook.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghook
spec:
  type: {{ .Values.ghook.service.type }}
  selector:
    {{- include "pgbranch.ghook.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ghook.port }}
      targetPort: http
{{- end }}
