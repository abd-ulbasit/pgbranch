{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgbranch.fullname" . }}-token
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "set token (REST API bearer token) or existingSecret" .Values.token | quote }}
{{- end }}
