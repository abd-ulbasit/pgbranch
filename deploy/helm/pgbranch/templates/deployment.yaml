apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgbranch.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
spec:
  # sqlite registry = single writer; keep one replica and recreate on upgrade.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pgbranch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgbranch.selectorLabels" . | nindent 8 }}
      annotations:
        # Prometheus pod-scrape discovery: branchd serves /metrics on the API
        # port without auth (see docs/observability.md).
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.port | quote }}
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: {{ include "pgbranch.fullname" . }}
      # Pin to the storage node: branchd's sqlite state shares the node (and
      # data root) with the CoW volumes it manages.
      nodeName: {{ required "set node to the storage node name (kubectl get nodes)" .Values.node }}
      containers:
        - name: branchd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if not (has .Values.storage.mode (list "hostpath" "csi")) }}
          {{- fail "storage.mode must be hostpath or csi" }}
          {{- end }}
          args:
            - --runtime=kube
            - --kube-node={{ .Values.node }}
            - --kube-data-root={{ .Values.dataRoot }}
            {{- if eq .Values.storage.mode "csi" }}
            - --kube-storage=csi
            - --csi-storage-class={{ required "set storage.storageClass to a StorageClass supporting PVC cloning (required with storage.mode=csi)" .Values.storage.storageClass }}
            {{- with .Values.storage.snapshotClass }}
            - --csi-snapshot-class={{ . }}
            {{- end }}
            {{- with .Values.storage.volumeSize }}
            - --csi-volume-size={{ . }}
            {{- end }}
            {{- end }}
            {{- if .Values.rotateBranchCredentials }}
            - --rotate-branch-credentials
            {{- end }}
            - --api-addr=:{{ .Values.api.port }}
            - --pg-addr=:{{ .Values.proxy.port }}
            {{- with .Values.proxy.tls.certSecret }}
            # wire-protocol TLS for the Postgres router (secret mounted below)
            - --pg-tls-cert=/etc/pgbranch/proxy-tls/tls.crt
            - --pg-tls-key=/etc/pgbranch/proxy-tls/tls.key
            {{- end }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            - --stuck-timeout={{ .Values.stuckTimeout }}
          env:
            - name: PGBRANCH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbranch.tokenSecretName" . }}
                  key: token
            # sqlite registry on the storage node (mounted below)
            - name: PGBRANCH_HOME
              value: {{ .Values.dataRoot }}/state
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
            - name: proxy
              containerPort: {{ .Values.proxy.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
          # /readyz is real readiness: registry reachable + driver responds
          # (liveness above is just process-up). Both are unauthenticated.
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
          securityContext:
            # root for write access to the hostPath state dir (see values.yaml)
            runAsUser: {{ .Values.runAsUser }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.dataRoot }}/state
            {{- with .Values.proxy.tls.certSecret }}
            - name: proxy-tls
              mountPath: /etc/pgbranch/proxy-tls
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: state
          {{- if eq (include "pgbranch.persistenceEnabled" .) "true" }}
          persistentVolumeClaim:
            claimName: {{ include "pgbranch.fullname" . }}-state
          {{- else }}
          hostPath:
            path: {{ .Values.dataRoot }}/state
            type: DirectoryOrCreate
          {{- end }}
        {{- with .Values.proxy.tls.certSecret }}
        - name: proxy-tls
          secret:
            secretName: {{ . }}
        {{- end }}
