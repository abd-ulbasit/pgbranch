{{- if and .Values.ghook.enabled (not .Values.ghook.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgbranch.ghook.fullname" . }}
  labels:
    {{- include "pgbranch.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghook
type: Opaque
stringData:
  webhook-secret: {{ required "set ghook.webhookSecret or ghook.existingSecret" .Values.ghook.webhookSecret | quote }}
  {{- with .Values.ghook.githubToken }}
  github-token: {{ . | quote }}
  {{- end }}
{{- end }}
