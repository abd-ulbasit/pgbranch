# pgbranch runs all CoW data on ONE designated storage node (dev/test scope;
# multi-node via CSI is future work). branchd, its sqlite state, and every
# branch/helper pod are pinned to this node via nodeName + hostPath.

# REQUIRED: name of the storage node (kubectl get nodes).
node: ""

# Host directory on the storage node holding all CoW volumes. branchd's own
# state (sqlite registry) lives under <dataRoot>/state.
dataRoot: /var/lib/pgbranch

# CoW backend: this chart deploys branchd with the default OverlayFS backend
# (hostpath storage) or the csi backend (storage.mode=csi). The experimental
# zfs backend (branchd --cow zfs --zfs-dataset ...) needs a zpool on the
# storage node and privileged helper pods; it is not wired into chart values
# yet — see docs/zfs.md to run it by hand.

# Branch data storage (see docs/kubernetes.md):
#  - hostpath (default): plain directories under dataRoot on `node`; branch
#    pods are pinned there and overlay-mount in-container (CAP_SYS_ADMIN).
#  - csi: sources/branches are PVCs and every branch is a PVC clone; branch
#    pods schedule on ANY node with no extra capabilities. Requires a
#    StorageClass whose CSI driver supports PVC cloning (e.g. EBS, Ceph RBD,
#    zfs-localpv, LINSTOR) — or VolumeSnapshots when snapshotClass is set.
#    `node` is still required: branchd itself keeps its sqlite state on it.
storage:
  mode: hostpath
  # REQUIRED when mode=csi: StorageClass for all pgbranch PVCs.
  storageClass: ""
  # Optional (mode=csi): VolumeSnapshotClass — branches then clone via
  # VolumeSnapshot + restore instead of direct PVC dataSource clones.
  snapshotClass: ""
  # Optional (mode=csi): size of every pgbranch PVC (branchd defaults to
  # 10Gi; CSI drivers thin-provision, so roomy is cheap).
  volumeSize: ""

# Durability of branchd's own state (the sqlite registry). When enabled the
# state dir is a PersistentVolumeClaim instead of hostPath <dataRoot>/state,
# so the registry survives node loss/rollover. `enabled` is a TRI-STATE
# string, not a bool:
#  - "" (default): auto — ON when storage.mode=csi (branch data already
#    lives in PVCs; the registry should be as durable), OFF with hostpath
#    (state shares the storage node's disk with the CoW data anyway).
#  - "true": force on (hostpath too — needs a StorageClass that can place
#    the volume on/reachable from `node`).
#  - "false": force off even in csi mode (registry stays on the node).
persistence:
  enabled: ""
  size: 1Gi
  # StorageClass for the state PVC; empty = the cluster's default class.
  storageClass: ""

image:
  repository: pgbranch/branchd
  tag: dev
  # The dev tag is built locally (make docker-build) and side-loaded
  # (e.g. `kind load`); change to Always for a pushed registry image.
  pullPolicy: IfNotPresent

# Bearer token for the REST API. Exactly one of these is required:
#  - token: the chart renders a Secret holding it
#  - existingSecret: name of a pre-created Secret with key "token"
token: ""
existingSecret: ""

api:
  port: 7070
  service:
    type: ClusterIP

# Postgres wire-protocol router (connect with dbname@branch). Expose as
# NodePort to reach branches from outside the cluster without port-forward.
proxy:
  port: 6432
  service:
    type: ClusterIP
    nodePort: "" # set when type is NodePort, e.g. 30432

# TTL reaper tick interval (branchd --reap-interval).
reapInterval: 30s

# Per-branch credential rotation (branchd --rotate-branch-credentials): every
# branch gets its own generated password instead of inheriting the source's.
# The API then returns it as `password` and `pgb connect` prints it. Leave
# off for static-credential preview flows (e.g. Vercel-style env templating)
# that need every branch to accept the same source password.
rotateBranchCredentials: false

# branchd writes its sqlite registry to a hostPath on the storage node, so it
# must run as root for write access to that directory (simplest correct
# choice for the single-node scope; the branchd image has no other users).
# Branch pods (created by branchd at runtime, not by this chart) additionally
# get CAP_SYS_ADMIN for their in-container overlay mounts.
runAsUser: 0

resources: {}

# Optional GitHub webhook service (pgbranch-github): branch-per-PR. Disabled
# by default; see docs/github-app.md for the full setup walkthrough.
ghook:
  enabled: false
  image:
    repository: pgbranch/ghook
    tag: dev
    pullPolicy: IfNotPresent
  # Webhook HMAC secret (X-Hub-Signature-256). Exactly one is required when
  # enabled:
  #  - webhookSecret: the chart renders a Secret holding it
  #  - existingSecret: name of a pre-created Secret with key "webhook-secret"
  #    (and optionally "github-token")
  webhookSecret: ""
  existingSecret: ""
  # GitHub credentials enable the live connect-info PR comment and the
  # pgbranch/branch commit status. Two auth modes, mutually exclusive:
  #
  #  - GitHub App (recommended): set appId + appPrivateKey; the service
  #    mints short-lived installation tokens itself (nothing to rotate, bot
  #    identity for comments/statuses). The App needs Pull requests: read,
  #    Commit statuses: write, Issues: write. See docs/github-app.md.
  #  - PAT (quick path): set githubToken to a token with the same scopes.
  #
  # Leave all three empty to disable comments and statuses (branch
  # operations still run).
  appId: ""
  # PEM private key of the GitHub App (stored in the chart Secret as
  # app-private-key, wired as GHOOK_APP_PRIVATE_KEY). With
  # ghook.existingSecret, put the key under "app-private-key" there instead.
  appPrivateKey: ""
  # GitHub API token (PAT mode); mutually exclusive with appId.
  githubToken: ""
  # REQUIRED when enabled: pgbranch source to create PR branches from.
  source: ""
  # Branch TTL (Go duration, e.g. 72h); empty = branches never expire.
  ttl: 72h
  # Reset the branch to the source snapshot on every push (synchronize).
  resetOnPush: false
  # Comma-separated "owner/name" allow-list; empty accepts any repository
  # that signs with the webhook secret (logged as a warning).
  repos: ""
  # Branch naming: "pr-number" (default, pr-<N>) or "git-branch" (the PR's
  # head ref, sanitized — lets preview platforms derive the branch from the
  # git ref they already know, e.g. Vercel's VERCEL_GIT_COMMIT_REF, which is
  # present from the first build before any PR association exists).
  branchNaming: ""
  # host[:port] of the pgbranch proxy as reachable by developers (shown in
  # PR comments), e.g. a NodePort or LB address for proxy.service.
  proxyHost: ""
  # GitHub API base URL override (GitHub Enterprise).
  githubAPI: ""
  port: 8080
  service:
    type: ClusterIP
  resources: {}
