# pgbranch has two storage modes (docs/kubernetes.md): csi — branches as PVC
# clones, schedulable on any node, the recommended production-ish deployment
# — and hostpath (default), which keeps all CoW data on ONE designated
# storage node (single-node/dev scope). branchd itself is always pinned to
# `node`; in hostpath mode every branch/helper pod is pinned there too.

# REQUIRED: name of the storage node (kubectl get nodes).
node: ""

# Host directory on the storage node holding all CoW volumes. branchd's own
# state (sqlite registry) lives under <dataRoot>/state.
dataRoot: /var/lib/pgbranch

# CoW backend: this chart deploys branchd with the default OverlayFS backend
# (hostpath storage) or the csi backend (storage.mode=csi). The experimental
# zfs backend (branchd --cow zfs --zfs-dataset ...) needs a zpool on the
# storage node and privileged helper pods; it is not wired into chart values
# yet — see docs/zfs.md to run it by hand.

# Branch data storage (see docs/kubernetes.md):
#  - hostpath (default): plain directories under dataRoot on `node`; branch
#    pods are pinned there and overlay-mount in-container (CAP_SYS_ADMIN).
#  - csi: sources/branches are PVCs and every branch is a PVC clone; branch
#    pods schedule on ANY node with no extra capabilities. Requires a
#    StorageClass whose CSI driver supports PVC cloning (e.g. EBS, Ceph RBD,
#    zfs-localpv, LINSTOR) — or VolumeSnapshots when snapshotClass is set.
#    `node` is still required: branchd itself keeps its sqlite state on it.
storage:
  mode: hostpath
  # REQUIRED when mode=csi: StorageClass for all pgbranch PVCs.
  storageClass: ""
  # Optional (mode=csi): VolumeSnapshotClass — branches then clone via
  # VolumeSnapshot + restore instead of direct PVC dataSource clones.
  snapshotClass: ""
  # Optional (mode=csi): size of every pgbranch PVC (branchd defaults to
  # 10Gi; CSI drivers thin-provision, so roomy is cheap).
  volumeSize: ""

# Durability of branchd's own state (the sqlite registry). When enabled the
# state dir is a PersistentVolumeClaim instead of hostPath <dataRoot>/state,
# so the registry survives node loss/rollover. `enabled` is a TRI-STATE
# string, not a bool:
#  - "" (default): auto — ON when storage.mode=csi (branch data already
#    lives in PVCs; the registry should be as durable), OFF with hostpath
#    (state shares the storage node's disk with the CoW data anyway).
#  - "true": force on (hostpath too — needs a StorageClass that can place
#    the volume on/reachable from `node`).
#  - "false": force off even in csi mode (registry stays on the node).
persistence:
  enabled: ""
  size: 1Gi
  # StorageClass for the state PVC; empty = the cluster's default class.
  storageClass: ""

# Number of branchd replicas. Default 1 (single writer). The registry is a
# sqlite file on an RWO PVC / hostPath, so >1 replica is an HA standby setup,
# NOT horizontal scaling: only the leader reconciles and accepts mutating /v1
# requests; standbys serve reads + probes and fail over via the Lease. With
# replicaCount > 1 (or leaderElection.enabled) the chart turns on leader
# election automatically — see leaderElection below and docs/ha.md.
#
# Co-scheduling caveat: an RWO PVC binds to one node, so all replicas must
# schedule there (the chart already pins branchd to `node`). For replicas on
# different nodes use an RWX volume / a CSI driver that supports it.
replicaCount: 1

# HA leader election (branchd --leader-elect). When on (or replicaCount > 1),
# replicas contend for a coordination.k8s.io Lease (pgbranch-branchd) in the
# release namespace; the chart adds the leases RBAC and wires POD_NAME. Off by
# default for the single-replica deployment. See docs/ha.md.
leaderElection:
  enabled: false

image:
  repository: pgbranch/branchd
  tag: dev
  # The dev tag is built locally (make docker-build) and side-loaded
  # (e.g. `kind load`); change to Always for a pushed registry image.
  pullPolicy: IfNotPresent

# Bearer token for the REST API. Exactly one of these is required:
#  - token: the chart renders a Secret holding it. WARNING: a value passed via
#    --set token= (or a values file committed to git) is persisted IN CLEARTEXT
#    in the Helm release history (the release Secret) and visible to anyone with
#    `helm get values`. For anything beyond local/dev use existingSecret.
#  - existingSecret: name of a pre-created Secret with key "token" (PREFERRED).
#    Create it out-of-band (kubectl create secret / sealed-secrets / ESO) so the
#    token never touches Helm values or release history.
token: ""
existingSecret: ""

api:
  port: 7070
  service:
    type: ClusterIP

# Postgres wire-protocol router (connect with dbname@branch). Expose as
# NodePort to reach branches from outside the cluster without port-forward.
proxy:
  port: 6432
  service:
    type: ClusterIP
    nodePort: "" # set when type is NodePort, e.g. 30432
  # Wire-protocol TLS for the Postgres router. Point certSecret at a Secret
  # with tls.crt and tls.key (e.g. a cert-manager Certificate's secret); it is
  # mounted into branchd and passed to --pg-tls-cert/--pg-tls-key, so the proxy
  # answers SSLRequest with 'S' and serves TLS. Empty = plaintext (the proxy
  # answers 'N'). See docs/kubernetes.md for cert-manager issuance.
  tls:
    certSecret: ""

# Reconcile loop tick interval (branchd --reconcile-interval): each pass reaps
# expired branches, fails stuck rows, removes orphaned containers and GCs
# dangling layers/volumes.
reconcileInterval: 60s

# Age past which a creating/resetting branch row is considered stuck and failed
# by reconcile (branchd --stuck-timeout).
stuckTimeout: 10m

# Per-branch credential rotation (branchd --rotate-branch-credentials): every
# branch gets its own generated password instead of inheriting the source's.
# The API then returns it as `password` and `pgb connect` prints it. Leave
# off for static-credential preview flows (e.g. Vercel-style env templating)
# that need every branch to accept the same source password.
rotateBranchCredentials: false

# branchd writes its sqlite registry to a hostPath on the storage node, so it
# must run as root for write access to that directory (simplest correct
# choice for the single-node scope; the branchd image has no other users).
# Only the UID is values-driven: the branchd container still gets the rest of
# the hardening hardcoded (allowPrivilegeEscalation:false, all caps dropped,
# readOnlyRootFilesystem with a /tmp emptyDir, RuntimeDefault seccomp).
#
# SECURITY POSTURE — branch pods vs storage mode:
#  - hostpath/overlay mode (default): the branch pods branchd creates at
#    runtime (NOT this chart) need CAP_SYS_ADMIN + an UNCONFINED seccomp
#    profile to perform the in-container overlay mount (a privileged kernel
#    op). That is a single-node / trusted-workload posture only.
#  - csi mode (storage.mode=csi) is the RECOMMENDED PRODUCTION DEFAULT:
#    branches are PVC clones, branch pods need NO added capabilities and run
#    under the cluster's default (RuntimeDefault) seccomp, schedulable on any
#    node. Prefer csi whenever the cluster is shared/untrusted.
runAsUser: 0

resources: {}

# NetworkPolicies (templates/networkpolicy.yaml). OFF by default so existing
# installs don't lose connectivity, but RECOMMENDED on any shared cluster.
# Needs a CNI that enforces NetworkPolicy (Calico, Cilium, ...). When enabled
# the chart locks down: (a) ingress to branchd API/proxy to ghook + the
# selectors below + the metrics source; (b) ingress to branch pods to branchd
# only; (c) egress from branch pods to cluster DNS + the configured Postgres
# source(s) only.
networkPolicy:
  enabled: false
  # Who may reach branchd's API (7070) and proxy (6432). A list of raw
  # NetworkPolicyPeer objects (namespaceSelector and/or podSelector), e.g.:
  #   allowedClients:
  #     - namespaceSelector:
  #         matchLabels: { kubernetes.io/metadata.name: ci }
  #     - podSelector:
  #         matchLabels: { app: my-preview-app }
  # Empty = no extra clients (only ghook + metrics, when set).
  allowedClients: []
  # Where Prometheus scrapes from (branchd serves /metrics on the API port). A
  # list of NetworkPolicyPeer; empty = no scrape ingress opened. Example:
  #   metricsFrom:
  #     - namespaceSelector:
  #         matchLabels: { kubernetes.io/metadata.name: monitoring }
  metricsFrom: []
  # Cluster DNS peer(s) for branch-pod egress. Defaults to the kube-dns pods in
  # any namespace (k8s-app=kube-dns, the CoreDNS convention). Override if your
  # DNS uses different labels/namespace.
  dnsFrom: []
  # The Postgres source(s) branch pods hydrate from — a list of
  # NetworkPolicyPeer (podSelector/namespaceSelector and/or ipBlock). Empty =
  # no source egress opened (CSI-clone branches that carry their own data need
  # none; overlay branches reading a remote source do). Example:
  #   sourceEgress:
  #     - ipBlock: { cidr: 10.0.5.10/32 }
  sourceEgress: []
  # Ports allowed for sourceEgress (default Postgres 5432). Only used when
  # sourceEgress is set.
  sourcePorts:
    - protocol: TCP
      port: 5432

# Optional GitHub webhook service (pgbranch-github): branch-per-PR. Disabled
# by default; see docs/github-app.md for the full setup walkthrough.
ghook:
  enabled: false
  image:
    repository: pgbranch/ghook
    tag: dev
    pullPolicy: IfNotPresent
  # Webhook HMAC secret (X-Hub-Signature-256). Exactly one is required when
  # enabled:
  #  - webhookSecret: the chart renders a Secret holding it. Same caveat as
  #    `token` above — values passed via --set / a values file land in CLEARTEXT
  #    in the Helm release history. The same applies to githubToken and
  #    appPrivateKey below.
  #  - existingSecret: name of a pre-created Secret with key "webhook-secret"
  #    (and optionally "github-token" / "app-private-key"). PREFERRED for
  #    production — keeps all ghook secrets out of Helm values/history.
  webhookSecret: ""
  existingSecret: ""
  # GitHub credentials enable the live connect-info PR comment and the
  # pgbranch/branch commit status. Two auth modes, mutually exclusive:
  #
  #  - GitHub App (recommended): set appId + appPrivateKey; the service
  #    mints short-lived installation tokens itself (nothing to rotate, bot
  #    identity for comments/statuses). The App needs Pull requests: read,
  #    Commit statuses: write, Issues: write. See docs/github-app.md.
  #  - PAT (quick path): set githubToken to a token with the same scopes.
  #
  # Leave all three empty to disable comments and statuses (branch
  # operations still run).
  appId: ""
  # PEM private key of the GitHub App (stored in the chart Secret as
  # app-private-key, wired as GHOOK_APP_PRIVATE_KEY). With
  # ghook.existingSecret, put the key under "app-private-key" there instead.
  appPrivateKey: ""
  # GitHub API token (PAT mode); mutually exclusive with appId.
  githubToken: ""
  # REQUIRED when enabled: pgbranch source to create PR branches from.
  source: ""
  # Branch TTL (Go duration, e.g. 72h); empty = branches never expire.
  ttl: 72h
  # Reset the branch to the source snapshot on every push (synchronize).
  resetOnPush: false
  # Post a schema/data diff comment on the PR after the branch is ready
  # (opt-in; requires GitHub credentials). The comment carries its own marker,
  # separate from the live connect-info comment.
  diffOnPush: false
  # Comma-separated "owner/name" allow-list; empty accepts any repository
  # that signs with the webhook secret (logged as a warning).
  repos: ""
  # Branch naming: "pr-number" (default, pr-<N>) or "git-branch" (the PR's
  # head ref, sanitized — lets preview platforms derive the branch from the
  # git ref they already know, e.g. Vercel's VERCEL_GIT_COMMIT_REF, which is
  # present from the first build before any PR association exists).
  branchNaming: ""
  # host[:port] of the pgbranch proxy as reachable by developers (shown in
  # PR comments), e.g. a NodePort or LB address for proxy.service.
  proxyHost: ""
  # GitHub API base URL override (GitHub Enterprise).
  githubAPI: ""
  port: 8080
  service:
    type: ClusterIP
  resources: {}
